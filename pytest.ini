[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --disable-warnings
    -v
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    build: marks tests that require compilation tools  
    snapshot: marks tests that use snapshot comparison
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning